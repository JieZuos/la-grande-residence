53808f0c44ee0d4.js\",\"/_next/static/chunks/a42a8cd186af39c3.js\",\"/_next/static/chunks/943383594087c0c6.js\",\"/_next/static/chunks/f0df9fecceb56b1d.js\",\"/_next/static/chunks/e5df57153268f04f.js\"],\"Footer\"]\n12:T7a4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eLooking for a simple way to get to La Grande Residence?\u003c/strong\u003e Whether you’re coming by jeep or car, here’s a step-by-step guide to help you find us easily!\u003c/p\u003e\r\n\r\n\u003ch4\u003e🚍 Coming from SM Clark\u003c/h4\u003e\r\n\u003col\u003e\r\n  \u003cli\u003eGo to Hensonville Terminal (just near Astro Park).\u003c/li\u003e\r\n  \u003cli\u003eRide a yellow jeep going to Hensonville.\u003c/li\u003e\r\n  \u003cli\u003eFare is only ₱13 per person.\u003c/li\u003e\r\n  \u003cli\u003eAsk the driver to drop you at Mayon Street.\u003c/li\u003e\r\n  \u003cli\u003eFrom there, walk for 3 minutes and you’ll see \u003cstrong\u003eLa Grande Residence\u003c/strong\u003e.\u003c/li\u003e\r\n\u003c/ol\u003e\r\n\r\n\u003ch4\u003e🚍 Coming from SM San Fernando\u003c/h4\u003e\r\n\u003col\u003e\r\n  \u003cli\u003eAt the terminal, ride a jeep going to SM Clark.\u003c/li\u003e\r\n  \u003cli\u003eThe fare is only ₱45.\u003c/li\u003e\r\n  \u003cli\u003eGet off at Astro Park Terminal.\u003c/li\u003e\r\n  \u003cli\u003eWalk to Hensonville Terminal nearby.\u003c/li\u003e\r\n  \u003cli\u003eRide the yellow jeep going to Mayon Street (₱13 fare).\u003c/li\u003e\r\n  \u003cli\u003eWalk for 3 minutes, and you will find \u003cstrong\u003eLa Grande Residence\u003c/strong\u003e.\u003c/li\u003e\r\n\u003c/ol\u003e\r\n\r\n\u003ch4\u003e🚗 Coming by Car from SM Clark\u003c/h4\u003e\r\n\u003cp\u003e\u003cem\u003eOption 1: Via Balibago\u003c/em\u003e\u003c/p\u003e\r\n\u003col\u003e\r\n  \u003cli\u003eFrom SM Clark, drive toward Balibago.\u003c/li\u003e\r\n  \u003cli\u003eWhen you see Jollibee and Chowking, turn right.\u003c/li\u003e\r\n  \u003cli\u003eThen, take another right turn.\u003c/li\u003e\r\n  \u003cli\u003eContinue driving until you reach Southstar Drugstore.\u003c/li\u003e\r\n  \u003cli\u003eGo straight, then turn left at Mayon Street.\u003c/li\u003e\r\n  \u003cli\u003eDrive straight ahead until you see \u003cstrong\u003eLa Grande Residence\u003c/strong\u003e.\u003c/li\u003e\r\n\u003c/ol\u003e\r\n\r\n\u003cp\u003e\u003cem\u003eOption 2: Via CDC (Clark)\u003c/em\u003e\u003c/p\u003e\r\n\u003col\u003e\r\n  \u003cli\u003eExit Clark through the CDC gate on Don Juico Avenue.\u003c/li\u003e\r\n  \u003cli\u003eTurn right at Mt. Makiling Street, right after Bretto’s Deli \u0026amp; Coffee Shop.\u003c/li\u003e\r\n  \u003cli\u003eThen, turn left to Sarmiento Street.\u003c/li\u003e\r\n  \u003cli\u003eGo straight ahead — you’ll reach \u003cstrong\u003eLa Grande Residence\u003c/strong\u003e.\u003c/li\u003e\r\n\u003c/ol\u003e\r\n\r\n\u003ch4\u003e📍 Still Not Sure?\u003c/h4\u003e\r\n\u003cp\u003eNo problem! Use our Google Maps link for easy navigation:\u003cbr\u003e\r\n\u003ca href=\"https://maps.app.goo.gl/Ajx489fQzXapfxjM7\" target=\"_blank\"\u003eFind us on Google Maps\u003c/a\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$Lf\",null,{\"children\":[\"$\",\"div\",null,{\"className\":\"min-h-screen\",\"children\":[[\"$\",\"$L10\",null,{}],[\"$\",\"main\",null,{\"children\":[\"$\",\"$L11\",null,{\"blog\":{\"id\":9,\"title\":\"HOW TO GO TO LA GRANDE RESIDENCE?\",\"body\":\"$12\",\"image\":\"https://lagranderesidence.com/app.lagranderesidence.com/public/assets/lgr-web/blogs/thymrEi9dqkGBBOMKqmEaVVV32n2k7aOAv2KIPpd.webp\",\"stat\":0,\"created_at\":\"2025-05-09 01:32:20\",\"updated_at\":\"2026-05-05 02:18:46\"}}]}],[\"$\",\"$L13\",null,{}]]}]}]\n"])</script></body></html>
